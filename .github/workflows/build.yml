name: Build & Release
on:
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create a GitHub Release?'
        type: boolean
        required: true
        default: false
      version:
        description: "Release version tag (e.g. v1.0.0)"
        required: true
        default: "v1.0.0"
permissions:
  contents: write
jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Install pyinstaller
        run: pip install pyinstaller
      - name: Setup MSVC dev environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
      - name: Rebuild PyInstaller bootloader
        run: |
          $version = python -c "import PyInstaller; print(PyInstaller.__version__)"
          git clone --depth 1 --branch "v$version" https://github.com/pyinstaller/pyinstaller.git _pyinstaller_src
          cd _pyinstaller_src/bootloader
          Get-ChildItem src -Recurse -Include *.c,*.h,*.rc | ForEach-Object {
            (Get-Content $_.FullName) -replace 'PyInstaller', 'TgWsProxy' | Set-Content $_.FullName
          }
          python ./waf all --target-arch=64bit
          $dest = python -c "import PyInstaller; import os; print(os.path.join(os.path.dirname(PyInstaller.__file__), 'bootloader', 'Windows-64bit-intel'))"
          New-Item -ItemType Directory -Force -Path $dest
          Copy-Item -Force .\build\release\*  $dest
          Copy-Item -Force .\build\releasew\* $dest
        shell: pwsh

      - name: Verify bootloader hashes
        run: |
          python -c "import PyInstaller, pathlib, hashlib; built=pathlib.Path(r'_pyinstaller_src/bootloader/build/releasew/runw.exe'); inst=pathlib.Path(PyInstaller.__file__).parent/'bootloader'/'Windows-64bit-intel'/'runw.exe'; print(built); print(inst); print(hashlib.sha256(built.read_bytes()).hexdigest()); print(hashlib.sha256(inst.read_bytes()).hexdigest())"
        shell: pwsh

      - name: Verify bootloader strings
        run: |
          python -c "import PyInstaller; from pathlib import Path; built=Path(r'_pyinstaller_src/bootloader/build/releasew/runw.exe').read_bytes(); inst_path=Path(PyInstaller.__file__).parent/'bootloader'/'Windows-64bit-intel'/'runw.exe'; inst=inst_path.read_bytes(); print('built', b'TgWsProxy' in built, b'PyInstaller' in built); print('installed', b'TgWsProxy' in inst, b'PyInstaller' in inst)"
        shell: pwsh
      - name: Build EXE with PyInstaller
        run: pyinstaller packaging/windows.spec --noconfirm --log-level=DEBUG
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TgWsProxy
          path: |
            dist/TgWsProxy.exe

  build-win7:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python 3.8 (last version supporting Win7)
        uses: actions/setup-python@v5
        with:
          python-version: "3.8"
          cache: "pip"
      - name: Install dependencies (Win7-compatible)
        run: pip install -r requirements-win7.txt
      - name: Install pyinstaller
        run: pip install "pyinstaller==5.13.2"
      - name: Build EXE with PyInstaller (Win7)
        run: pyinstaller packaging/windows.spec --noconfirm
      - name: Rename artifact
        run: mv dist/TgWsProxy.exe dist/TgWsProxy-win7.exe
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TgWsProxy-win7
          path: dist/TgWsProxy-win7.exe

  release:
    needs: [build, build-win7]
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.create_release == 'true' }}
    steps:
      - name: Download main build
        uses: actions/download-artifact@v4
        with:
          name: TgWsProxy
          path: dist
      - name: Download Win7 build
        uses: actions/download-artifact@v4
        with:
          name: TgWsProxy-win7
          path: dist
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: "TG WS Proxy ${{ github.event.inputs.version }}"
          body: |
            ## TG WS Proxy ${{ github.event.inputs.version }}
          files: |
            dist/TgWsProxy.exe
            dist/TgWsProxy-win7.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
